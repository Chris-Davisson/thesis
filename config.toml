[database]
path = "thesis.db"

[model]
backend = "ollama"
name = "deepseek-r1:1.5b"
version = ""
endpoint = ""
Host_IP = "http://localhost:11434"
VLLM_Host = "http://10.101.68.83:8001"
max_tokens = 2048
temperature = 0.0
top_p = 1.0
seed = 42

[[scans]]
name = "01-sv-osc-top1000"
label = "Suite: sV/O/sC top 1000"
flags = ["-sV", "--version-intensity", "5", "-O", "-sC", "--top-ports", "1000", "-T4"]
timeout = 600

[[scans]]
name = "02-sv-intensity1"
label = "Suite: sV intensity 1"
flags = ["-sV", "--version-intensity", "1"]
timeout = 300

[[scans]]
name = "03-sv-intensity5"
label = "Suite: sV intensity 5"
flags = ["-sV", "--version-intensity", "5"]
timeout = 300

[[scans]]
name = "04-sv-intensity9"
label = "Suite: sV intensity 9"
flags = ["-sV", "--version-intensity", "9"]
timeout = 300

[[scans]]
name = "05-dns-sd-udp5353"
label = "Suite: DNS-SD UDP 5353"
flags = ["--script", "dns-service-discovery", "-sU", "-p", "5353"]
timeout = 180

[[scans]]
name = "06-upnp-udp1900"
label = "Suite: UPnP UDP 1900"
flags = ["--script", "upnp-info", "-sU", "-p", "1900"]
timeout = 180


# Add one [[truth]] block per device. mac is used to resolve device_id.
# [[truth]]
# ip             = ""
# mac            = ""
# true_vendor    = ""
# true_product   = ""
# true_firmware_version = ""
# accepted_cpes  = []
# rubric_version = "1.0"
# label_status   = ""
# notes          = ""



[prompt]
prompt = """You are a cybersecurity analyst. Given nmap scan data for a single network device, identify the device and output CPE 2.3 strings.

Rules:
- Generate CPEs for hardware (h), OS/firmware (o), and applications (a) you can confidently identify
- Vendor and product are required — omit a CPE entirely if you cannot identify both with confidence
- Use * for version if uncertain; do not guess
- Use * for unknown fields, - for not applicable
- End your response with exactly one JSON object: {"cpes": ["cpe:2.3:...", ...]}"""

cpe_format_example = """cpe:2.3:<part>:<vendor>:<product>:<version>:<update>:<edition>:<language>:<sw_edition>:<target_sw>:<target_hw>:<other>

Example:
{"cpes": ["cpe:2.3:h:arris:tg1672g:*:*:*:*:*:*:*:*", "cpe:2.3:o:linux:linux_kernel:3.2:*:*:*:*:*:*:*", "cpe:2.3:a:lighttpd:lighttpd:*:*:*:*:*:*:*:*"]}"""
