[database]
path = "thesis.db"

[model]
# backend picks the runtime. Each backend uses only its matching host/endpoint field:
#   "ollama"      -> ollama_host
#   "vllm"        -> vllm_host
#   "huggingface" -> no host (loads model locally via transformers)
#   "api"         -> api_endpoint (leave empty for Anthropic/OpenAI defaults)
backend      = "ollama"
name         = "deepseek-r1:1.5b"
version      = ""
ollama_host  = "http://localhost:11434"
vllm_host    = "http://10.101.68.83:8001"
api_endpoint = ""
max_tokens   = 2048
temperature  = 0.0
top_p        = 1.0
seed         = 42

[[scans]]
name = "01-sv-osc-top1000"
label = "Suite: sV/O/sC top 1000"
flags = ["-sV", "--version-intensity", "5", "-O", "-sC", "--top-ports", "1000", "-T4"]
timeout = 600

[[scans]]
name = "02-sv-intensity1"
label = "Suite: sV intensity 1"
flags = ["-sV", "--version-intensity", "1"]
timeout = 300

[[scans]]
name = "03-sv-intensity5"
label = "Suite: sV intensity 5"
flags = ["-sV", "--version-intensity", "5"]
timeout = 300

[[scans]]
name = "04-sv-intensity9"
label = "Suite: sV intensity 9"
flags = ["-sV", "--version-intensity", "9"]
timeout = 300

[[scans]]
name = "05-dns-sd-udp5353"
label = "Suite: DNS-SD UDP 5353"
flags = ["--script", "dns-service-discovery", "-sU", "-p", "5353"]
timeout = 180

[[scans]]
name = "06-upnp-udp1900"
label = "Suite: UPnP UDP 1900"
flags = ["--script", "upnp-info", "-sU", "-p", "1900"]
timeout = 180


[[truth]]
ip             = "192.168.1.1"
mac            = "AA:BB:CC:DD:EE:FF"
true_vendor    = "amazon"
true_product   = "fire_tv"
true_firmware_version = "7.2.3.3"
accepted_cpes  = [
    {cpe = "cpe:2.3:h:amazon:fire_tv:*:*:*:*:*:*:*:*", tier = "exact"},
    {cpe = "cpe:2.3:o:amazon:fire_os:*:*:*:*:*:*:*:*", tier = "exact"},
    {cpe = "cpe:2.3:o:linux:linux_kernel:*:*:*:*:*:*:*:*", tier = "partial"},
]
rubric_version = "1.0"
label_status   = "verified"
notes          = "Fire TV Stick 4K Max, firmware from About screen"



[prompt]
# The prompt_id to use for this run. IDs come from the prompts table.
# Run `python seed_prompts.py --list` to see what's available.
prompt_id = 2